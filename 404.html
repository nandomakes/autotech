<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Autotech Industrial Solutions</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--dark);
      background-image: repeating-linear-gradient(
        -55deg,
        transparent,
        transparent 60px,
        rgba(255,255,255,0.012) 60px,
        rgba(255,255,255,0.012) 61px
      );
      text-align: center;
      padding: 2rem;
    }
    .error-content { max-width: 520px; }
    .error-code {
      font-family: var(--font-heading);
      font-size: clamp(6rem, 15vw, 10rem);
      font-weight: 700;
      color: var(--red);
      line-height: 1;
      margin-bottom: 1rem;
      opacity: 0.85;
    }
    .error-title {
      font-family: var(--font-heading);
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 700;
      text-transform: uppercase;
      color: var(--white);
      margin-bottom: 1rem;
    }
    .error-desc {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    .error-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-content">
      <div class="error-code">404</div>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-desc">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
      <div class="error-actions">
        <a href="index.html" class="btn btn-primary btn-lg">
          <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>
        <a href="index.html#contact" class="btn btn-ghost btn-lg">
          <i class="fa-solid fa-phone"></i> Contact Us
        </a>
      </div>
    </div>
  </div>
</body>
</html>
